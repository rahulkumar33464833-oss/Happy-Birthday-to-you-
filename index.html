<!DOCTYPE html><html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Special Surprise 🎉</title>
  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #ff9a9e, #fad0c4);
      color: #333;
      text-align: center;
    }
    .container {
      padding: 30px;
    }
    h1 {
      font-size: 2.5rem;
      color: #fff;
    }
    p {
      font-size: 1.2rem;
    }
    .card {
      background: white;
      border-radius: 20px;
      padding: 20px;
      margin: 20px auto;
      max-width: 400px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.2);
    }
    button {
      padding: 12px 20px;
      border: none;
      border-radius: 10px;
      background: #ff6f61;
      color: white;
      font-size: 1rem;
      cursor: pointer;
    }
    iframe {
      border-radius: 12px;
      margin-top: 15px;
    }
  </style>
</head>
<body>  <div class="container">
    <h1>🎂 A Special Surprise 🎂</h1><div class="card">
  <p>Today is not just a day… it's a celebration of YOU 💖</p>
</div>

<div class="card">
  <h2>💌 Message</h2>
  <p>You are amazing, strong, and truly special. Never forget how much you mean! ✨</p>
</div>

<div class="card">
  <h2>🎶 Your Surprise Video</h2>
  <iframe width="100%" height="200" 
    src="https://www.youtube.com/embed/5u4xTa3LR2U" 
    title="YouTube video player" 
    frameborder="0" 
    allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" 
    allowfullscreen>
  </iframe>
</div>

<div class="card">
  <h2>🎁 Final Surprise</h2>
  <button onclick="showSurprise()">Click Me 🎉</button>
  <p id="surpriseText" style="display:none; margin-top:15px; font-weight:bold;">
    You deserve all the happiness in the world 💕
  </p>
</div>

  </div>  <script>
    function showSurprise() {
      document.getElementById('surpriseText').style.display = 'block';
    }
  </script></body>
</html>
